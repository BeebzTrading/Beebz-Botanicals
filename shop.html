<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | Beebz Botanicals</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="logo">Beebz Botanicals</div>

<nav class="nav">
<a href="./index.html">Home</a>
<a href="./shop.html">Shop</a>
<a href="./about.html">About</a>
<a href="./contact.html">Contact</a>
</nav>
</header>

<!-- ✅ MOVED INSIDE BODY -->
<button class="cart-toggle" onclick="toggleCart()">🛒 Cart</button>

<div id="cart" class="cart">
<div class="cart-header">
<h2>Your Cart</h2>
<button onclick="closeCart()">✕</button>
</div>
<div id="cart-items"></div>
<h3 id="cart-total">Total: R0</h3>
<button onclick="goCheckout()" class="checkout-btn">Checkout</button>
</div>

<section class="section">
<h2>Shop Collection</h2>

<div class="shop-controls">

<input 
type="text"
id="searchInput"
placeholder="Search products..."
onkeyup="searchProducts()"
>

<div class="shop-filters">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('soaps')">Soaps</button>
<button onclick="filterProducts('salts')">Bath Salts</button>
<button onclick="filterProducts('tea')">Bath Teas</button>
<button onclick="filterProducts('bundles')">Bundles</button>
</div>

</div>

<div id="shop-products" class="product-grid"></div>

</section>

<script src="./products.js"></script>
<script src="./script.js"></script>

<footer class="footer">

 <div class="footer-links">
  <a href="./privacy.html">Privacy Policy</a>
  <a href="./terms.html">Terms</a>
  <a href="./contact.html">Contact</a>
</div>

  <p class="footer-text">
    Beebz Botanicals creates handcrafted botanical self-care products inspired by nature and designed for everyday luxury.
  </p>

  <p class="footer-copy">
    © 2026 Beebz Botanicals
  </p>

</footer>

</body>
</html>
