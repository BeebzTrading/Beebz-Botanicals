
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Checkout</h1>
<p id="totalDisplay"></p>

<a id="emailOrder" href="#">Send Order Email</a>

<script>

const params=new URLSearchParams(window.location.search)
const total=params.get("total")||0

document.getElementById("totalDisplay").innerText="Total: R"+total

const email="hello@beebzbotanicals.com"
const subject="New Order"
const body="Order Total: R"+total

document.getElementById("emailOrder").href =
"mailto:"+email+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body)

</script>

</body>
</html>
