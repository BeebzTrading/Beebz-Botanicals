<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Beebz Botanicals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="logo">Beebz Botanicals</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="section checkout-wrap">
    <h2>Checkout</h2>
    <h3 id="totalDisplay">Order Total: R0</h3>

    <form action="https://www.payfast.co.za/eng/process" method="post" class="checkout-form">
      <input type="hidden" name="merchant_id" value="34046773">
      <input type="hidden" name="merchant_key" value="9svi25uskcuxa">
      <input type="hidden" name="amount" id="amountField">
      <input type="hidden" name="item_name" value="Beebz Botanicals Order">

      <button class="checkout-btn" type="submit">Pay Securely</button>
    </form>
  </section>

  <footer class="footer">
    <p>© 2026 Beebz Botanicals • Botanical Self-Care</p>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const total = params.get("total") || 0;
    document.getElementById("totalDisplay").innerText = "Order Total: R" + total;
    document.getElementById("amountField").value = total;
  </script>
</body>
</html>
