
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Beebz Botanicals</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="logo">Beebz Botanicals</div>

<nav class="nav">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section class="section">

<h2>Checkout</h2>

<h3 id="totalDisplay"></h3>

<form action="https://www.payfast.co.za/eng/process" method="post">

<input type="hidden" name="merchant_id" value="YOUR_MERCHANT_ID">
<input type="hidden" name="merchant_key" value="YOUR_MERCHANT_KEY">
<input type="hidden" name="amount" id="amountField">
<input type="hidden" name="item_name" value="Beebz Botanicals Order">

<button class="checkout-btn" type="submit">Pay Securely</button>

</form>

</section>

<script>
const params = new URLSearchParams(window.location.search)
const total = params.get("total") || 0
document.getElementById("totalDisplay").innerText = "Order Total: R" + total
document.getElementById("amountField").value = total
</script>

<footer class="footer">
<p>© 2026 Beebz Botanicals</p>
</footer>

</body>
</html>
