<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Product | Beebz Botanicals</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="./images/logo.jpeg"> Beebz Botanicals
  </div>

  <nav class="nav">
    <a href="./index.html">Home</a>
    <a href="./shop.html">Shop</a>
    <a href="./about.html">About</a>
    <a href="./contact.html">Contact</a>
  </nav>
</header>

<!-- CART -->
<button class="cart-toggle" onclick="toggleCart()">🛒 Cart</button>

<div id="cart" class="cart">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button onclick="closeCart()">✕</button>
  </div>
  <div id="cart-items"></div>
  <h3 id="cart-total">Total: R0</h3>
  <button onclick="goCheckout()" class="checkout-btn">Checkout</button>
</div>

<!-- PRODUCT -->
<div id="product-page"></div>

<script src="products.js"></script>
<script src="script.js"></script>

<script>
window.onload = function(){

  const params = new URLSearchParams(window.location.search);
  const rawId = params.get("id");

  const container = document.getElementById("product-page");

  if(!container){
    console.error("product-page div not found");
    return;
  }

  if(typeof products === "undefined"){
    container.innerHTML = "<p>Error loading products</p>";
    return;
  }

  let product = products.find(p => p.id === rawId);

  if(!product){
    container.innerHTML = "<p>Product not found</p>";
    return;
  }

  container.innerHTML = `
    <div style="max-width:1100px;margin:40px auto;padding:0 20px;">

      <a href="./shop.html" class="back-btn">← Back to Shop</a>

      <div style="
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:50px;
        align-items:start;
        margin-top:20px;
      ">

        <div>
          <img id="main-image" src="${product.image}" style="
            width:100%;
            border-radius:12px;
          ">
          <div id="thumbs" style="
            display:flex;
            gap:12px;
            margin-top:15px;
            flex-wrap:wrap;
          "></div>
        </div>

        <div>
          <h1 style="font-size:32px;margin-bottom:10px;">
            ${product.name}
          </h1>

          <p style="font-size:24px;font-weight:600;margin-bottom:18px;">
            R${product.price}
          </p>

          <p style="line-height:1.7;margin-bottom:18px;">
            ${product.description}
          </p>

          <p style="line-height:1.7;margin-bottom:25px;">
            ${product.ingredients || "Ingredients not available."}
          </p>

          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
            <label>Quantity:</label>
           <div class="quantity-wrapper">
  <button id="minus">−</button>
  <span id="quantity-value">1</span>
  <button id="plus">+</button>
</div>

          <button id="add-to-cart-btn" style="
            padding:12px 24px;
            border:none;
            border-radius:8px;
            background:#e8dcd1;
            font-weight:600;
            cursor:pointer;
          ">
            Add to Cart
          </button>

        </div>

      </div>
    </div>
  `;

  // Quantity logic
  const addBtn = document.getElementById("add-to-cart-btn");
  const quantityInput = document.getElementById("quantity");

  addBtn.onclick = function () {
    const quantity = parseInt(quantityInput.value) || 1;

    for (let i = 0; i < quantity; i++) {
      addToCart(product.name, product.price, product.image);
    }
  };

  // Image gallery
  const main = document.getElementById("main-image");
  const thumbs = document.getElementById("thumbs");

  let images = [];

  if(product.image) images.push(product.image);
  if(product.images) images.push(...product.images);

  images.forEach(imgSrc => {
    const img = document.createElement("img");
    img.src = imgSrc;
    img.style.width = "70px";
    img.style.height = "70px";
    img.style.objectFit = "cover";
    img.style.borderRadius = "8px";
    img.style.cursor = "pointer";

    img.onclick = () => main.src = imgSrc;

    thumbs.appendChild(img);
  });

  renderCart();
};
</script>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-links">
    <a href="./privacy.html">Privacy Policy</a>
    <a href="./terms.html">Terms</a>
    <a href="./contact.html">Contact</a>
  </div>

  <p class="footer-text">
    Beebz Botanicals creates handcrafted botanical self-care products inspired by nature and designed for everyday luxury.
  </p>

  <p class="footer-copy">
    © 2026 Beebz Botanicals
  </p>
</footer>

</body>
</html>
