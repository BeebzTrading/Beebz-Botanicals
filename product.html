<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | Beebz Botanicals</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="logo">Beebz Botanicals</div>
<nav class="nav">
<a href="./index.html">Home</a>
<a href="./shop.html">Shop</a>
<a href="./about.html">About</a>
<a href="./contact.html">Contact</a>
</nav>
</header>

<section class="section" id="product-page"></section>

<button class="cart-toggle" onclick="toggleCart()">🛒 Cart</button>

<div id="cart" class="cart">
<div class="cart-header">
<h2>Your Cart</h2>
<button onclick="closeCart()">✕</button>
</div>
<div id="cart-items"></div>
<h3 id="cart-total">Total: R0</h3>
<button onclick="goCheckout()" class="checkout-btn">Checkout</button>
</div>

<script src="./products.js"></script>
<script src="./script.js"></script>

<script>
const params = new URLSearchParams(window.location.search)
const productName = decodeURIComponent(params.get("id"))

const product = products.find(p => p.name === productName)

const container = document.getElementById("product-page")

if(product){
  container.innerHTML = `
    <div style="max-width:900px;margin:auto;text-align:center">

      <img src="${product.image}" style="width:100%;max-width:400px;border-radius:12px">

      <h1 style="margin-top:20px">${product.name}</h1>

      <p class="price" style="font-size:20px">R${product.price}</p>

      <p style="max-width:600px;margin:20px auto">
        A premium handcrafted botanical product designed to elevate your self-care routine with natural ingredients and luxurious fragrance.
      </p>

      <button onclick="addToCart('${product.name}',${product.price},'${product.image}')"
        style="margin-top:20px;padding:12px 24px;background:#2f4f46;color:white;border:none;border-radius:30px">
        Add to Cart
      </button>

    </div>
  `
} else {
  container.innerHTML = "<p>Product not found</p>"
}
</script>

</body>
  
</html>
