<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | Beebz Botanicals</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="logo"><img src="./images/logo.jpeg" alt="Beebz Botanicals Logo">
  Beebz Botanicals
</div>
<nav class="nav">
<a href="./index.html">Home</a>
<a href="./shop.html">Shop</a>
<a href="./about.html">About</a>
<a href="./contact.html">Contact</a>
</nav>
</header>

<section class="section" id="product-page"></section>

<button class="cart-toggle" onclick="toggleCart()">🛒 Cart</button>

<div id="cart" class="cart">
<div class="cart-header">
<h2>Your Cart</h2>
<button onclick="closeCart()">✕</button>
</div>
<div id="cart-items"></div>
<h3 id="cart-total">Total: R0</h3>
<button onclick="goCheckout()" class="checkout-btn">Checkout</button>
</div>

<script src="./products.js"></script>
<script src="./script.js"></script>

<script>
const params = new URLSearchParams(window.location.search)
const productName = params.get("id")

const product = products.find(p => p.name === productName)

const container = document.getElementById("product-page")

if(product){

  const related = products
    .filter(p => p.category === product.category && p.name !== product.name)
    .slice(0,3)

  container.innerHTML = `
    <div style="max-width:1000px;margin:auto">

      <!-- BACK BUTTON -->
      <div style="width:100%;text-align:left;">
        <a href="./shop.html" style="display:inline-block;margin-bottom:20px;color:#2f4f46;text-decoration:none;font-weight:500;">
          ← Back to Shop
        </a>
      </div>

      <!-- PRODUCT GRID -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center">

        <div>
          <img src="${product.image}" style="width:100%;border-radius:12px">
        </div>

        <div style="text-align:left">
          <h1>${product.name}</h1>
          <p class="price" style="font-size:22px">R${product.price}</p>

          <p style="margin:20px 0">
            ${product.description}
          </p>

          <h3>Ingredients</h3>
          <p style="font-size:14px;opacity:0.8;margin-bottom:20px">
            ${product.ingredients || "No ingredients listed"}
          </p>

          <!-- QUANTITY -->
          <div style="margin:20px 0;display:flex;align-items:center;gap:10px">
            <button onclick="changeQty(-1)" style="padding:6px 12px">−</button>
            <span id="qty">1</span>
            <button onclick="changeQty(1)" style="padding:6px 12px">+</button>
          </div>

          <!-- ADD TO CART -->
          <button onclick="addMultipleToCart('${product.name.replace(/'/g, "\\'")}', ${product.price}, '${product.image}')"
            style="padding:14px 28px;background:#2f4f46;color:white;border:none;border-radius:30px">
            Add to Cart
          </button>

        </div>

      </div>

    </div>

    <!-- RELATED PRODUCTS -->
    <div style="max-width:1000px;margin:60px auto">
      <h2 style="text-align:center;margin-bottom:30px">You May Also Like</h2>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px">

        ${related.map(p => `
          <div style="text-align:center;background:white;padding:15px;border-radius:12px">
            
            <a href="./product.html?id=${encodeURIComponent(p.name)}">
              <img src="${p.image}" style="width:100%;border-radius:8px">
              <h3 style="margin:10px 0">${p.name}</h3>
            </a>

            <p>R${p.price}</p>

            <button onclick="addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.image}')"
              style="margin-top:10px;padding:10px 16px;background:#2f4f46;color:white;border:none;border-radius:30px">
              Add to Cart
            </button>

          </div>
        `).join("")}

      </div>
    </div>
  `
} else {
  container.innerHTML = "<p style='text-align:center'>Product not found</p>"
}
</script>

<footer class="footer">
 <div class="footer-links">
  <a href="./privacy.html">Privacy Policy</a>
  <a href="./terms.html">Terms</a>
  <a href="./contact.html">Contact</a>
</div>

  <p class="footer-text">
    Beebz Botanicals creates handcrafted botanical self-care products inspired by nature and designed for everyday luxury.
  </p>

  <p class="footer-copy">
    © 2026 Beebz Botanicals
  </p>
</footer>

</body>
</html>
