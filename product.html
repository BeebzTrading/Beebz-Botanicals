<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Product | Beebz Botanicals</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="cart-popup">Added to cart ✓</div>
<header class="header">
  <div class="logo">
    <img src="./images/logo.jpeg"> Beebz Botanicals
  </div>

  <nav class="nav">
    <a href="./index.html">Home</a>
    <a href="./shop.html">Shop</a>
    <a href="./about.html">About</a>
    <a href="./contact.html">Contact</a>
  </nav>
</header>

<button class="cart-toggle" onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
<div id="cart" class="cart">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button onclick="closeCart()">✕</button>
  </div>
  <div id="cart-items"></div>
  <h3 id="cart-total">Total: R0</h3>
 <button onclick="goCheckout()" class="checkout-btn" id="checkout-btn">
  Checkout
</button>
</div>

<div id="product-page"></div>

<script src="products.js"></script>
<script src="script.js"></script>

<script>
window.onload = function(){

  const params = new URLSearchParams(window.location.search);
  const rawId = params.get("id");

  const container = document.getElementById("product-page");

  if(!container || typeof products === "undefined") return;

  let product = products.find(p => p.id === rawId);

  if(!product){
    container.innerHTML = "<p>Product not found</p>";
    return;
  }

  container.innerHTML = `
    <div style="max-width:1100px;margin:40px auto;padding:0 20px;">

      <a href="./shop.html" class="back-btn">← Back to Shop</a>

      <div class="product-layout">

        <div>
          <img id="main-image" src="${product.image}" style="width:100%;border-radius:12px;">
          <div id="thumbs" style="display:flex;gap:12px;margin-top:15px;flex-wrap:wrap;"></div>
        </div>

        <div class="product-info">

          <h1>${product.name}</h1>

          <p style="font-size:24px;font-weight:600;">
            R${product.price}
          </p>

          <p>${product.description}</p>

          <p style="font-size:14px;color:#555;">
            ${product.ingredients || ""}
          </p>

          <div class="product-actions">

            <div class="quantity-wrapper">
              <button id="minus">−</button>
              <span id="quantity-value">1</span>
              <button id="plus">+</button>
            </div>

            <button id="add-to-cart-btn" class="add-to-cart-btn">
              🛒 Add to Cart
            </button>

          </div>

        </div>

      </div>

      <!-- ✅ RECOMMENDED SECTION -->
      <div class="recommended-section">
        <h2>You May Also Like</h2>
        <div id="recommended-products" class="product-grid"></div>
      </div>

    </div>
  `;

  // Quantity
  let quantity = 1;

  const quantityDisplay = document.getElementById("quantity-value");
  const plusBtn = document.getElementById("plus");
  const minusBtn = document.getElementById("minus");
  const addBtn = document.getElementById("add-to-cart-btn");

  plusBtn.onclick = () => {
    quantity++;
    quantityDisplay.innerText = quantity;
  };

  minusBtn.onclick = () => {
    if(quantity > 1){
      quantity--;
      quantityDisplay.innerText = quantity;
    }
  };

  addBtn.onclick = () => {
    for(let i = 0; i < quantity; i++){
      addToCart(product.name, product.price, product.image);
    }
  };

  // Images
  const main = document.getElementById("main-image");
  const thumbs = document.getElementById("thumbs");

  let images = [];
  if(product.image) images.push(product.image);
  if(product.images) images.push(...product.images);

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.style.width = "70px";
    img.style.cursor = "pointer";
    img.style.borderRadius = "8px";

    img.onclick = () => main.src = src;

    thumbs.appendChild(img);
  });

  // ✅ RECOMMENDED PRODUCTS
  const recommendedContainer = document.getElementById("recommended-products");

  let recommended = products.filter(p => 
    p.category === product.category && p.id !== product.id
  );

  if(recommended.length < 3){
    recommended = products.filter(p => p.id !== product.id);
  }

  recommended.slice(0, 3).forEach(p => {
    const div = document.createElement("div");
    div.classList.add("product");

    div.innerHTML = `
      <a href="./product.html?id=${p.id}">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
      </a>
      <p class="price">R${p.price}</p>
      <button onclick="addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.image}')">
        Add to Cart
      </button>
    `;

    recommendedContainer.appendChild(div);
  });

  renderCart();
};
</script>

<footer class="footer">
  <div class="footer-links">
    <a href="./privacy.html">Privacy Policy</a>
    <a href="./terms.html">Terms</a>
    <a href="./contact.html">Contact</a>
  </div>

  <p class="footer-text">
    Beebz Botanicals creates handcrafted botanical self-care products inspired by nature and designed for everyday luxury.
  </p>

  <p class="footer-copy">
    © 2026 Beebz Botanicals
  </p>
</footer>

</body>
</html>
