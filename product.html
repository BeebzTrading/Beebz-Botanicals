<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Product | Beebz Botanicals</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="./images/logo.jpeg"> Beebz Botanicals
  </div>

  <nav class="nav">
    <a href="./index.html">Home</a>
    <a href="./shop.html">Shop</a>
    <a href="./about.html">About</a>
    <a href="./contact.html">Contact</a>
  </nav>
</header>

<button class="cart-toggle" onclick="toggleCart()">🛒 Cart</button>

<div id="cart" class="cart">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button onclick="closeCart()">✕</button>
  </div>
  <div id="cart-items"></div>
  <h3 id="cart-total">Total: R0</h3>
  <button onclick="goCheckout()" class="checkout-btn">Checkout</button>
</div>

<div id="product-page"></div>

<script src="products.js"></script>
<script src="script.js"></script>

<script>
window.onload = function(){

  const params = new URLSearchParams(window.location.search);
  const rawId = params.get("id");

  const container = document.getElementById("product-page");

  if(!container || typeof products === "undefined") return;

  let product = products.find(p => p.id === rawId);

  if(!product){
    container.innerHTML = "<p>Product not found</p>";
    return;
  }

  container.innerHTML = `
    <div style="max-width:1100px;margin:40px auto;padding:0 20px;">

      <a href="./shop.html" class="back-btn">← Back to Shop</a>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:50px;margin-top:20px;">

        <div>
          <img id="main-image" src="${product.image}" style="width:100%;border-radius:12px;">
          <div id="thumbs" style="display:flex;gap:12px;margin-top:15px;flex-wrap:wrap;"></div>
        </div>

        <div>
          <h1 style="font-size:32px;margin-bottom:10px;">${product.name}</h1>
          <p style="font-size:24px;font-weight:600;margin-bottom:18px;">R${product.price}</p>
          <p style="margin-bottom:18px;">${product.description}</p>
          <p style="margin-bottom:25px;">${product.ingredients || ""}</p>

          <div class="quantity-wrapper">
            <button id="minus">−</button>
            <span id="quantity-value">1</span>
            <button id="plus">+</button>
          </div>

          <button id="add-to-cart-btn">Add to Cart</button>
        </div>

      </div>
    </div>
  `;

  let quantity = 1;

  const quantityDisplay = document.getElementById("quantity-value");
  const plusBtn = document.getElementById("plus");
  const minusBtn = document.getElementById("minus");
  const addBtn = document.getElementById("add-to-cart-btn");

  plusBtn.onclick = () => {
    quantity++;
    quantityDisplay.innerText = quantity;
  };

  minusBtn.onclick = () => {
    if(quantity > 1){
      quantity--;
      quantityDisplay.innerText = quantity;
    }
  };

  addBtn.onclick = () => {
    for(let i = 0; i < quantity; i++){
      addToCart(product.name, product.price, product.image);
    }
  };

  const main = document.getElementById("main-image");
  const thumbs = document.getElementById("thumbs");

  let images = [];
  if(product.image) images.push(product.image);
  if(product.images) images.push(...product.images);

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.style.width = "70px";
    img.style.cursor = "pointer";
    img.style.borderRadius = "8px";

    img.onclick = () => main.src = src;

    thumbs.appendChild(img);
  });

  renderCart();
};
</script>

<footer class="footer">
  <div class="footer-links">
    <a href="./privacy.html">Privacy Policy</a>
    <a href="./terms.html">Terms</a>
    <a href="./contact.html">Contact</a>
  </div>

  <p class="footer-text">
    Beebz Botanicals creates handcrafted botanical self-care products inspired by nature and designed for everyday luxury.
  </p>

  <p class="footer-copy">
    © 2026 Beebz Botanicals
  </p>
</footer>

</body>
</html>
