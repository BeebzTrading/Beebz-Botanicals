
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="logo">Beebz Botanicals</div>
<nav class="nav">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
</header>


<h1>Signature Botanical Soap</h1>

<div class="gallery">
<img id="main-img" src="images/soap.jpg">

<div class="thumbs">
<img src="images/soap.jpg" onclick="changeImage(this)">
<img src="images/soap2.jpg" onclick="changeImage(this)">
<img src="images/soap3.jpg" onclick="changeImage(this)">
</div>
</div>

<button onclick="addToCart('Signature Botanical Soap',120,'images/soap.jpg',false)">Add to Cart</button>

<section class="reviews">

<h2>Customer Reviews</h2>

<div id="review-list"></div>

<input id="review-text" placeholder="Write a review">
<button onclick="submitReview()">Submit Review</button>

</section>


<button class="cart-toggle" onclick="toggleCart()">🛒 Cart</button>

<div id="cart" class="cart">
<div class="cart-header">
<h2>Your Cart</h2>
<button onclick="closeCart()">✕</button>
</div>

<div id="cart-items"></div>

<h3 id="cart-total"></h3>

<button onclick="goCheckout()" class="checkout-btn">Checkout</button>
</div>

<script src="script.js"></script>

</body>
</html>
