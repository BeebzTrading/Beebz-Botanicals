<script>
document.addEventListener("DOMContentLoaded", function(){

  const params = new URLSearchParams(window.location.search)
  const productName = decodeURIComponent(params.get("id") || "").trim().toLowerCase()

  const product = products.find(p => 
    p.name.trim().toLowerCase() === productName
  )

  const container = document.getElementById("product-page")

  // 🛑 STOP CRASHING
  if(!product){
    container.innerHTML = "<p style='text-align:center'>Product not found</p>"
    console.error("Product not found:", productName)
    return
  }

  const related = products
    .filter(p => p.category === product.category && p.name !== product.name)
    .slice(0,3)

  container.innerHTML = `
    <div style="max-width:1000px;margin:auto">

      <div style="width:100%;text-align:left;">
        <a href="./shop.html">← Back to Shop</a>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center">

        <div>
          <img id="main-product-image" src="${product.image}" style="width:100%;border-radius:12px">
          <div id="thumbnail-container" style="display:flex;gap:10px;margin-top:10px"></div>
        </div>

        <div>
          <h1>${product.name}</h1>
          <p>R${product.price}</p>
          <p>${product.description}</p>

          <div>
            <button onclick="changeQty(-1)">−</button>
            <span id="qty">1</span>
            <button onclick="changeQty(1)">+</button>
          </div>

          <button onclick="addMultipleToCart('${product.name}', ${product.price}, '${product.image}')">
            Add to Cart
          </button>
        </div>

      </div>
    </div>
  `

  // ✅ SAFE GALLERY
  const mainImage = document.getElementById("main-product-image")
  const thumbnailContainer = document.getElementById("thumbnail-container")

  let allImages = []

  if(product.image) allImages.push(product.image)
  if(product.images && Array.isArray(product.images)){
    for(let i=0;i<product.images.length;i++){
      allImages.push(product.images[i])
    }
  }

  for(let i=0;i<allImages.length;i++){
    const img = allImages[i]

    const thumb = document.createElement("img")
    thumb.src = img
    thumb.style.width = "60px"
    thumb.style.cursor = "pointer"

    thumb.onclick = function(){
      mainImage.src = img
    }

    thumbnailContainer.appendChild(thumb)
  }

})
</script>
