<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Product | Beebz Botanicals</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="./images/logo.jpeg"> Beebz Botanicals
  </div>

  <nav class="nav">
    <a href="./index.html">Home</a>
    <a href="./shop.html">Shop</a>
    <a href="./about.html">About</a>
    <a href="./contact.html">Contact</a>
  </nav>
</header>

 <button class="cart-toggle" onclick="toggleCart()">🛒 Cart</button>

<div id="cart" class="cart">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button onclick="closeCart()">✕</button>
  </div>

  <div id="cart-items"></div>

  <h3 id="cart-total">Total: R0</h3>

  <button onclick="goCheckout()" class="checkout-btn">
    Checkout
  </button>
</div>
  
<!-- ✅ THIS WAS MISSING -->
<div id="product-page"></div>

<script src="products.js"></script>
<script src="script.js"></script>

<script>
window.onload = function(){

  const params = new URLSearchParams(window.location.search);
  const rawId = params.get("id");

  const container = document.getElementById("product-page");

  if(!container){
    console.error("product-page div not found");
    return;
  }

  if(typeof products === "undefined"){
    container.innerHTML = "<p>Error loading products</p>";
    return;
  }

  let product = products.find(p => p.id === rawId);

  if(!product){
    container.innerHTML = "<p>Product not found</p>";
    return;
  }

  container.innerHTML = `
    <div style="max-width:1000px;margin:auto">

   <a href="./shop.html" class="back-btn">
  ← Back to Shop
</a>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px">

        <div>
          <img id="main-image" src="${product.image}" style="width:100%">
          <div id="thumbs" style="display:flex;gap:10px;margin-top:10px"></div>
        </div>

        <div>
          <h1>${product.name}</h1>
          <p>R${product.price}</p>
          <p>${product.description}</p>

          <button onclick="addToCart('${product.name}', ${product.price}, '${product.image}')">
            Add to Cart
          </button>
        </div>

      </div>
    </div>
  `;

  const main = document.getElementById("main-image");
  const thumbs = document.getElementById("thumbs");

  let images = [];

  if(product.image) images.push(product.image);
  if(product.images) images.push(...product.images);

  images.forEach(imgSrc => {
    const img = document.createElement("img");
    img.src = imgSrc;
    img.style.width = "60px";
    img.style.cursor = "pointer";

    img.onclick = () => main.src = imgSrc;

    thumbs.appendChild(img);
  });

};
</script>
</body>
</html>
