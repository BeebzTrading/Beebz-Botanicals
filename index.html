
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beebz Botanicals</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
<div class="logo">Beebz Botanicals</div>
<nav class="nav">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="product.html">Product</a>
</nav>
</header>

<section class="hero">
<h1>Luxury Botanical Self‑Care</h1>
<p>Handcrafted soaps and bath rituals</p>
<a class="btn" href="shop.html">Shop Now</a>
</section>

<section class="section">
<h2>Best Sellers</h2>

<div class="products">

<div class="product">
<img src="images/soap.jpg">
<h3>Signature Botanical Soap</h3>
<p>R120</p>
<button onclick="addToCart('Signature Botanical Soap',120,'images/soap.jpg',false)">Add to Cart</button>
</div>

<div class="product">
<img src="images/bundle.jpg">
<h3>Botanical Ritual Bundle</h3>
<p>R320</p>
<button onclick="addToCart('Botanical Ritual Bundle',320,'images/bundle.jpg',true)">Add to Cart</button>
</div>

</div>

</section>

<button class="cart-toggle" onclick="toggleCart()">🛒 Cart</button>

<div id="cart" class="cart">
<h2>Your Cart</h2>
<div id="cart-items"></div>
<h3 id="cart-total"></h3>

<label>Shipping</label>
<select id="shipping">
<option value="0">Collect (Free)</option>
<option value="80">Courier R80</option>
<option value="120">Express R120</option>
</select>

<button onclick="goCheckout()">Checkout</button>
</div>

<script src="script.js"></script>

</body>
</html>
