<!DOCTYPE html>
<html lang="en">
<head>

<header class="header">

    <a href="shop.html">Shop</a>

  </nav>

<section class="section">
  <h2>Contact</h2>
  <div class="contact-box">
    <p>Email: hello@beebzbotanicals.com</p>

  <h3 id="cart-total" class="cart-total">Total: R0</h3>
  <button class="checkout-btn" type="button" onclick="goCheckout()">Checkout</button>
